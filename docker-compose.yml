services:
  frontend:
    build:
      context: ./FrontendBlog
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    env_file:
      - ./FrontendBlog/.env
    depends_on:
      - backend
    networks:
      - blog-net
    restart: unless-stopped

  backend:
    build:
      context: ./BackendBlog12
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SUPABASE_DB_URL: "${SUPABASE_DB_URL}"
      SUPABASE_DB_USER: "${SUPABASE_DB_USER}"
      SUPABASE_DB_PASSWORD: "${SUPABASE_DB_PASSWORD}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - blog-net
    restart: unless-stopped

networks:
  blog-net:
    driver: bridge
